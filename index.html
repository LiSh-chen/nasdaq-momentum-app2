<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NDX100 Momentum Lab V2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg:         #0a0c10;
  --bg2:        #0f1217;
  --bg3:        #141820;
  --border:     #1e2530;
  --border2:    #2a3342;
  --text:       #e8edf5;
  --text2:      #8b96a8;
  --text3:      #4a5568;
  --accent:     #00d4ff;
  --accent2:    #0099cc;
  --green:      #00e676;
  --green2:     #00c85a;
  --red:        #ff4757;
  --red2:       #cc3344;
  --orange:     #ff9f1c;
  --purple:     #7c5cbf;
  --gold:       #ffd700;
  --mono:       'Space Mono', monospace;
  --sans:       'DM Sans', sans-serif;
  --r:          6px;
  --r2:         12px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:''; position:fixed; inset:0;
  background-image: linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events:none; z-index:0;
}

/* ===== HEADER ===== */
header {
  position: sticky; top:0; z-index:100;
  background: rgba(10,12,16,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex; align-items:center; gap:32px; height: 56px;
}
.logo { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.logo span { color: var(--text3); font-weight:400; }

nav { display:flex; gap:4px; flex:1; }
nav button {
  background: none; border: none; padding: 6px 16px; border-radius: var(--r);
  font-family: var(--sans); font-size: 13px; color: var(--text2); cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
nav button:hover { color: var(--text); background: var(--bg3); }
nav button.active { color: var(--accent); background: rgba(0,212,255,0.08); font-weight:500; }

.header-status { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--text3); }
.status-dot { width:6px; height:6px; border-radius:50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ===== MAIN ===== */
main { position:relative; z-index:1; }
.page { display:none; animation: fadeIn 0.2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.container { max-width:1400px; margin:0 auto; padding:24px 32px; }

/* ===== SECTION HEADER ===== */
.section-header { display:flex; align-items:center; gap:16px; margin-bottom: 20px; flex-wrap:wrap;}
.section-title { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
.section-sub { font-size: 12px; color: var(--text3); }

select.date-select {
  background: var(--bg2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--mono); font-size: 13px; padding: 4px 12px; border-radius: var(--r); outline:none;
}

/* ===== STAT CARDS ===== */
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px 18px; }
.stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
.stat-value { font-family: var(--mono); font-size: 22px; font-weight:700; color: var(--text); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.accent { color: var(--accent); }

/* ===== TABLE ===== */
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; }
.table-toolbar { display:flex; align-items:center; gap:12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg3); }
.search-box { flex:1; max-width:240px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 6px 12px; font-family:var(--sans); font-size:13px; color:var(--text); outline:none; }
.toolbar-right { margin-left:auto; font-size:12px; color:var(--text3); font-family:var(--mono); }

table { width:100%; border-collapse:collapse; }
thead th { padding: 10px 14px; text-align:left; font-family:var(--mono); font-size:11px; color:var(--text3); letter-spacing:1px; border-bottom: 1px solid var(--border); white-space:nowrap; cursor:pointer; background: var(--bg3); position:sticky; top:0; z-index:10;}
thead th.sorted { color:var(--accent); }
thead th.num { text-align:right; }
tbody tr { border-bottom: 1px solid rgba(30,37,48,0.6); }
tbody tr:hover { background: rgba(255,255,255,0.025); }
td { padding: 9px 14px; font-size: 13px; }
td.num { text-align:right; font-family:var(--mono); font-size:12px; }

.rank-badge { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; font-family:var(--mono); font-size:11px; font-weight:700; }
.rank-1 { background: rgba(255,215,0,0.15); color:var(--gold); }
.rank-2 { background: rgba(192,192,192,0.15); color:#c0c0c0; }
.rank-3 { background: rgba(205,127,50,0.15); color:#cd7f32; }
.rank-top { background: rgba(0,230,118,0.1); color:var(--green); }
.rank-mid { background: var(--bg3); color:var(--text3); }

.ticker-chip { display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:13px; }
.mom-bar-wrap { display:flex; align-items:center; gap:8px; }
.mom-bar { flex:1; height:4px; border-radius:2px; background: var(--bg3); max-width:80px; overflow:hidden; }
.mom-bar-fill { height:100%; border-radius:2px; }

/* ===== MULTI-SELECT CONTROLS ===== */
.controls-row { display:flex; flex-wrap:wrap; align-items:flex-start; gap:20px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 20px 24px; margin-bottom: 24px; }
.control-group { display:flex; flex-direction:column; gap:8px; }
.control-label { font-family:var(--mono); font-size:11px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; font-weight:700;}
.checkbox-group { display:flex; gap:12px; flex-wrap:wrap; background:var(--bg3); padding:8px 12px; border-radius:var(--r); border:1px solid var(--border);}
.checkbox-group label { font-size:13px; display:flex; align-items:center; gap:4px; cursor:pointer; color:var(--text2); }
.checkbox-group label:hover { color:var(--text); }
.checkbox-group input[type="checkbox"] { accent-color: var(--accent); cursor:pointer;}

.control-select { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 12px; font-family:var(--sans); font-size:13px; color:var(--text); outline:none; cursor:pointer; min-width:140px; }

.run-btn { padding: 10px 28px; border-radius: var(--r); border: none; cursor:pointer; font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: var(--bg); margin-left:auto; align-self:flex-end; box-shadow: 0 0 16px rgba(0,212,255,0.2); }
.run-btn:hover { transform:translateY(-1px); box-shadow: 0 0 24px rgba(0,212,255,0.35); }

/* ===== CHART ===== */
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 20px; margin-bottom: 24px; }
.chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.chart-title { font-family:var(--mono); font-size:12px; color:var(--text2); letter-spacing:1px; }
.chart-container { position:relative; height:400px; }

/* ===== GIANT MATRIX TABLE ===== */
.matrix-wrap { overflow:auto; max-height:600px; }
.matrix-table { table-layout:fixed; width: max-content; border-spacing: 0;}
.matrix-table th { min-width: 65px; text-align:center; padding: 6px; font-size:10px;}
.matrix-table th:first-child { min-width:90px; position:sticky; left:0; z-index:20; background:var(--bg2); border-right:1px solid var(--border);}
.matrix-table td { padding: 4px; font-family:var(--mono); font-size:10px; text-align:center; border: 1px solid var(--border); }
.matrix-table td:first-child { position:sticky; left:0; z-index:10; background:var(--bg2); border-right:1px solid var(--border); font-weight:bold; color:var(--text2);}
.cell-top5 { border: 2px solid var(--gold) !important; color: var(--gold); font-weight: bold; background: rgba(255,215,0,0.05); }
.cell-pos { color: var(--green); background: rgba(0,230,118,0.05); }
.cell-neg { color: var(--red); background: rgba(255,71,87,0.05); }
.cell-out { background: var(--bg3); color: transparent; } /* Non-constituents */

/* ===== TABS ===== */
.tab-bar { display:flex; gap:0; border-bottom: 1px solid var(--border); overflow-x:auto; }
.tab-btn { padding: 12px 20px; background:none; border:none; font-family:var(--mono); font-size:12px; color:var(--text3); cursor:pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space:nowrap; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:700;}
.tab-panel { display:none; padding:16px 0;}
.tab-panel.active { display:block; }

/* ===== LOADING ===== */
.loading-overlay { display:none; position:fixed; inset:0; background: rgba(10,12,16,0.85); z-index:200; backdrop-filter:blur(4px); align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.loading-overlay.show { display:flex; }
.loading-spinner { width:40px; height:40px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius:50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:#3a4555; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">運算中…</div>
</div>

<header>
  <div class="logo">NDX<span>/</span>100 <span>MOMENTUM LAB V2</span></div>
  <nav>
    <button class="active" onclick="showPage('momentum')">📊 動能排名</button>
    <button onclick="showPage('backtest')">🔁 回測分析</button>
  </nav>
</header>

<main>

<!-- ===== PAGE 1: MOMENTUM RANKING ===== -->
<div class="page active" id="page-momentum">
<div class="container">

  <div class="section-header">
    <span class="section-title">// 動能排名檢視</span>
    <span class="section-sub">僅顯示當期成份股</span>
    <div style="margin-left:auto;">
      <select id="dateSelect" class="date-select" onchange="computeMomentumRanking()"></select>
    </div>
  </div>

  <div class="stat-row" id="momentumStats">
    <div class="stat-card">
      <div class="stat-label">成份股數</div>
      <div class="stat-value" id="statCount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最高動能 (60日)</div>
      <div class="stat-value green" id="statMax">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最低動能 (60日)</div>
      <div class="stat-value red" id="statMin">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">正動能比例</div>
      <div class="stat-value" id="statPos">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-toolbar">
      <input class="search-box" type="text" id="searchBox" placeholder="搜尋標的…" oninput="renderMomentumTable()">
      <div class="toolbar-right" id="tableCount">— 筆</div>
    </div>
    <div style="overflow-x:auto; max-height:600px; overflow-y:auto;">
      <table id="momentumTable">
        <thead>
          <tr>
            <th onclick="sortTable('rank')" class="sorted">#</th>
            <th onclick="sortTable('ticker')">標的</th>
            <th onclick="sortTable('price')" class="num">現價 (USD)</th>
            <th onclick="sortTable('price60')" class="num">60日前 (USD)</th>
            <th onclick="sortTable('mom')" class="num">60日動能</th>
            <th class="num" style="min-width:120px">動能視覺化</th>
          </tr>
        </thead>
        <tbody id="momentumBody"></tbody>
      </table>
    </div>
  </div>

</div>
</div>

<!-- ===== PAGE 2: BACKTEST ===== -->
<div class="page" id="page-backtest">
<div class="container">

  <div class="section-header">
    <span class="section-title">// 策略回測與參數比較</span>
    <span class="section-sub">支援多重參數疊加比較</span>
  </div>

  <div class="controls-row">
    <div class="control-group">
      <label class="control-label">再平衡週期 (可多選)</label>
      <div class="checkbox-group" id="freqGroup">
        <label><input type="checkbox" value="M"> 月度</label>
        <label><input type="checkbox" value="Q" checked> 季度</label>
        <label><input type="checkbox" value="SA"> 半年</label>
      </div>
    </div>
    
    <div class="control-group">
      <label class="control-label">動能窗口 (可多選)</label>
      <div class="checkbox-group" id="momWinGroup">
        <label><input type="checkbox" value="30"> 30天</label>
        <label><input type="checkbox" value="60" checked> 60天</label>
        <label><input type="checkbox" value="90"> 90天</label>
        <label><input type="checkbox" value="120"> 120天</label>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">持倉數量</label>
      <select class="control-select" id="posSelect">
        <option value="3">前 3 名</option>
        <option value="5" selected>前 5 名</option>
        <option value="10">前 10 名</option>
      </select>
    </div>

    <div class="control-group">
      <label class="control-label">手續費/股 (USD)</label>
      <select class="control-select" id="commSelect">
        <option value="0">$0</option>
        <option value="0.01">$0.01</option>
        <option value="0.1" selected>$0.10</option>
      </select>
    </div>
    
    <button class="run-btn" onclick="runBacktest()">▶ 執行回測比較</button>
  </div>

  <div id="backtestResults" style="display:none;">
    
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">// 總資產成長曲線比較 (初始資金: $10,000 USD)</span>
      </div>
      <div class="chart-container">
        <canvas id="growthChart"></canvas>
      </div>
    </div>

    <!-- Detail tabs -->
    <div class="table-wrap">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(0,this)">回測績效總覽</button>
        <button class="tab-btn" onclick="switchTab(1,this)">全股票歷史動能矩陣 (60日)</button>
      </div>
      
      <!-- Tab 0: Summary Table -->
      <div class="tab-panel active" id="tabPanel0">
        <div style="overflow-x:auto;">
          <table style="width:100%;">
            <thead>
              <tr>
                <th>策略名稱</th>
                <th class="num">最終淨值</th>
                <th class="num">總報酬率</th>
                <th class="num">年化報酬率</th>
                <th class="num">最大回撤</th>
                <th class="num">總手續費</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Tab 1: Matrix Heatmap -->
      <div class="tab-panel" id="tabPanel1">
        <div style="padding:0 16px 12px; font-size:12px; color:var(--text2);">
          * 僅顯示在該月份屬於 NDX100 的成份股。<br>
          * 數值為 60日動能(%)。 <span style="color:var(--gold); border:1px solid var(--gold); padding:1px 4px; border-radius:3px;">金框</span> 表示當期前5名，
          <span style="color:var(--green)">綠字</span> 為正動能，<span style="color:var(--red)">紅字</span> 為負動能。非成份股以深灰底隱藏。
        </div>
        <div class="matrix-wrap" id="matrixContainer">
          <!-- Rendered async -->
        </div>
      </div>

    </div>
  </div>

</div>
</div>

</main>

<script>
// ==========================================
// GLOBAL STATE & UTILS
// ==========================================
let HIST = null;          
let MEMBERSHIP = null;    
let momentumData = [];    
let sortCol = 'rank';
let sortDir = 1;
let growthChart = null;

// Palette for chart lines
const CHART_COLORS = ['#00d4ff', '#00e676', '#ff9f1c', '#7c5cbf', '#ff4757', '#ffd700', '#ff00ff', '#00ffcc'];

// Initialization
async function init() {
  try {
    const [histRes, memRes] = await Promise.all([
      fetch('historical_data.json'),
      fetch('membership.json'),
    ]);
    HIST = await histRes.json();
    MEMBERSHIP = await memRes.json();

    // Populate Date Dropdown
    const dateSelect = document.getElementById('dateSelect');
    // Iterate backwards so newest is first
    for(let i = HIST.dates.length - 1; i >= 0; i--) {
      let opt = document.createElement('option');
      opt.value = i;
      opt.textContent = HIST.dates[i];
      dateSelect.appendChild(opt);
    }
    
    computeMomentumRanking();
  } catch(e) {
    alert('資料載入失敗: ' + e.message);
  }
}

// Helper: Is ticker in index at dateIdx?
function isInIdx(ticker, dateIdx) {
  const mem = MEMBERSHIP[ticker];
  if (!mem) return false;
  // strict match: only if it is explicitly in the index this month
  // (using +/- 1 tolerance in case of data alignment, but strict is better)
  return mem.includes(dateIdx) || mem.includes(dateIdx-1); 
}

// Helper: Get past date index
function getPastIdx(dateIdx, days) {
  const target = new Date(HIST.dates[dateIdx]);
  target.setDate(target.getDate() - days);
  let best = 0;
  for (let i = dateIdx - 1; i >= 0; i--) {
    if (new Date(HIST.dates[i]) <= target) { best = i; break; }
  }
  return best;
}

function setLoading(show, text='運算中…') {
  const ol = document.getElementById('loadingOverlay');
  document.getElementById('loadingText').textContent = text;
  ol.classList.toggle('show', show);
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.target.classList.add('active');
}

function switchTab(idx, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabPanel' + idx).classList.add('active');
}

// ==========================================
// PAGE 1: MOMENTUM RANKING
// ==========================================
function computeMomentumRanking() {
  const dateIdx = parseInt(document.getElementById('dateSelect').value);
  const idx60 = getPastIdx(dateIdx, 60);
  
  momentumData = [];
  
  for (const ticker of HIST.tickers) {
    // REQUIREMENT 1: Only current constituents
    if (!isInIdx(ticker, dateIdx)) continue;
    
    const curP = HIST.prices[ticker][dateIdx];
    const p60  = HIST.prices[ticker][idx60];
    
    if (curP == null || p60 == null || p60 === 0) continue;
    
    const mom = (curP / p60 - 1) * 100;
    momentumData.push({ ticker, curP, p60, mom });
  }

  // Sort and Rank
  momentumData.sort((a, b) => b.mom - a.mom);
  momentumData.forEach((d, i) => d.rank = i + 1);

  // Stats
  const moms = momentumData.map(d => d.mom);
  const posCount = moms.filter(v => v > 0).length;

  document.getElementById('statCount').textContent = momentumData.length;
  document.getElementById('statMax').textContent = moms.length ? '+' + Math.max(...moms).toFixed(1) + '%' : '-';
  document.getElementById('statMin').textContent = moms.length ? Math.min(...moms).toFixed(1) + '%' : '-';
  document.getElementById('statPos').textContent = moms.length ? Math.round(posCount / moms.length * 100) + '%' : '-';

  renderMomentumTable();
}

function renderMomentumTable() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const maxMom = momentumData.length ? Math.max(...momentumData.map(d=>Math.abs(d.mom))) : 1;

  let data = momentumData.slice();
  if (search) data = data.filter(d => d.ticker.toLowerCase().includes(search));

  // Sort logic
  const dirs = {
    rank: (a,b) => a.rank - b.rank,
    ticker: (a,b) => a.ticker.localeCompare(b.ticker),
    price: (a,b) => b.curP - a.curP,
    price60: (a,b) => b.p60 - a.p60,
    mom: (a,b) => b.mom - a.mom
  };
  if (dirs[sortCol]) data.sort((a,b) => dirs[sortCol](a,b) * sortDir);

  document.getElementById('tableCount').textContent = data.length + ' 筆';

  let html = '';
  for (const d of data) {
    const rankCls = d.rank === 1 ? 'rank-1' : d.rank === 2 ? 'rank-2' : d.rank === 3 ? 'rank-3' :
                    d.rank <= 5 ? 'rank-top' : 'rank-mid';
    const momColor = d.mom >= 0 ? 'var(--green)' : 'var(--red)';
    const barPct = Math.min(100, Math.abs(d.mom) / maxMom * 100);
    const barColor = d.mom >= 0 ? 'var(--green2)' : 'var(--red2)';

    html += `<tr>
      <td><span class="rank-badge ${rankCls}">${d.rank}</span></td>
      <td><span class="ticker-chip"><span class="ticker-dot in-index"></span><strong>${d.ticker}</strong></span></td>
      <td class="num">$${d.curP.toFixed(2)}</td>
      <td class="num" style="color:var(--text3)">$${d.p60.toFixed(2)}</td>
      <td class="num" style="color:${momColor};font-weight:700">${(d.mom>=0?'+':'')+d.mom.toFixed(2)}%</td>
      <td>
        <div class="mom-bar-wrap">
          <div class="mom-bar"><div class="mom-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
        </div>
      </td>
    </tr>`;
  }
  document.getElementById('momentumBody').innerHTML = html;
}

function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted');
  renderMomentumTable();
}

// ==========================================
// PAGE 2: BACKTEST ENGINE (MULTI-PARAM)
// ==========================================
function runBacktest() {
  const freqs = Array.from(document.querySelectorAll('#freqGroup input:checked')).map(el => el.value);
  const momWins = Array.from(document.querySelectorAll('#momWinGroup input:checked')).map(el => parseInt(el.value));
  
  if (freqs.length === 0 || momWins.length === 0) {
    alert('請至少選擇一種週期與一種動能窗口！');
    return;
  }

  const nPos = parseInt(document.getElementById('posSelect').value);
  const comm = parseFloat(document.getElementById('commSelect').value);
  const capitalUSD = 10000; // Fixed initial for comparison

  setLoading(true, '執行多重回測中…');

  // Use setTimeout to allow UI to render loading spinner
  setTimeout(() => {
    try {
      const results = [];
      let colorIdx = 0;

      // Cross product of parameters
      for(const f of freqs) {
        for(const mw of momWins) {
          const res = executeSingleBacktest(f, nPos, mw, capitalUSD, comm);
          res.label = `[${f}] ${mw}天動能 (Top${nPos})`;
          res.color = CHART_COLORS[colorIdx % CHART_COLORS.length];
          results.push(res);
          colorIdx++;
        }
      }

      // Add QQQ baseline
      const qqqRes = backtestQQQ(capitalUSD);
      qqqRes.label = 'QQQ Buy & Hold';
      qqqRes.color = 'rgba(255, 255, 255, 0.6)';
      results.push(qqqRes);

      renderBacktestResults(results);
      
      // Render the giant matrix (async to prevent freezing)
      setTimeout(renderGiantMatrix, 10);
      
    } catch(e) {
      alert('回測錯誤：' + e.message);
      console.error(e);
    }
    setLoading(false);
  }, 50);
}

function executeSingleBacktest(freq, nPos, momWin, capitalUSD, comm) {
  const n = HIST.dates.length;
  
  // Build rebalance dates
  const rebalSet = new Set();
  let lastRebal = null;
  const freqMonths = freq === 'M' ? 1 : (freq === 'Q' ? 3 : 6);
  
  for (let i = 0; i < n; i++) {
    const d = new Date(HIST.dates[i]);
    if (!lastRebal) { rebalSet.add(i); lastRebal = d; continue; }
    const monthsDiff = (d.getFullYear() - lastRebal.getFullYear()) * 12 + (d.getMonth() - lastRebal.getMonth());
    if (monthsDiff >= freqMonths) { rebalSet.add(i); lastRebal = d; }
  }

  let cash = capitalUSD;
  let portfolio = {}; 
  const monthlyHistory = [];
  let totalComm = 0;
  let peak = capitalUSD;
  let maxDD = 0;

  for (let i = 0; i < n; i++) {
    if (rebalSet.has(i)) {
      const pastIdx = getPastIdx(i, momWin);
      const momScores = [];
      
      for (const ticker of HIST.tickers) {
        if (!isInIdx(ticker, i)) continue; // STRICT CONSTITUENT CHECK
        const curP = HIST.prices[ticker][i];
        const pastP = HIST.prices[ticker][pastIdx];
        if (curP != null && pastP != null && pastP > 0) {
          momScores.push({ ticker, mom: curP / pastP - 1, price: curP });
        }
      }
      
      momScores.sort((a, b) => b.mom - a.mom);
      const top = momScores.slice(0, nPos);
      const topTickers = new Set(top.map(x => x.ticker));

      // SELL
      for (const [ticker, shares] of Object.entries(portfolio)) {
        if (!topTickers.has(ticker)) {
          const p = HIST.prices[ticker][i];
          if (p != null) {
            cash += (shares * p) - (shares * comm);
            totalComm += shares * comm;
          }
          delete portfolio[ticker];
        }
      }

      // BUY
      let portVal = 0;
      for (const [ticker, shares] of Object.entries(portfolio)) portVal += shares * HIST.prices[ticker][i];
      const target = (cash + portVal) / nPos;

      for (const { ticker, price } of top) {
        const curVal = (portfolio[ticker] || 0) * price;
        const need = target - curVal;
        if (need > 0) {
          const sharesToBuy = need / price;
          const cost = sharesToBuy * price;
          const fee = sharesToBuy * comm;
          if (cash >= cost + fee) {
            cash -= (cost + fee);
            totalComm += fee;
            portfolio[ticker] = (portfolio[ticker] || 0) + sharesToBuy;
          }
        }
      }
    }

    // Snapshot
    let pv = 0;
    for (const [ticker, shares] of Object.entries(portfolio)) {
      if (HIST.prices[ticker][i] != null) pv += shares * HIST.prices[ticker][i];
    }
    const total = cash + pv;
    if (total > peak) peak = total;
    const dd = (total - peak) / peak * 100;
    if (dd < maxDD) maxDD = dd;
    
    monthlyHistory.push(total);
  }

  const finalUSD = monthlyHistory[n - 1];
  const totalReturn = (finalUSD / capitalUSD - 1) * 100;
  const annReturn = (Math.pow(finalUSD / capitalUSD, 12 / n) - 1) * 100;

  return { monthlyData: monthlyHistory, finalUSD, totalReturn, annReturn, maxDD, totalComm };
}

function backtestQQQ(capitalUSD) {
  const qqq = HIST.qqq;
  const shares = capitalUSD / qqq[0];
  const monthlyData = [];
  let peak = capitalUSD;
  let maxDD = 0;

  for (let i = 0; i < qqq.length; i++) {
    const total = shares * qqq[i];
    if (total > peak) peak = total;
    const dd = (total - peak) / peak * 100;
    if (dd < maxDD) maxDD = dd;
    monthlyData.push(total);
  }

  const finalUSD = monthlyData[monthlyData.length - 1];
  return { 
    monthlyData, finalUSD, 
    totalReturn: (finalUSD / capitalUSD - 1) * 100, 
    annReturn: (Math.pow(finalUSD / capitalUSD, 12 / qqq.length) - 1) * 100,
    maxDD, totalComm: 0 
  };
}

function renderBacktestResults(results) {
  document.getElementById('backtestResults').style.display = 'block';

  // 1. Render Summary Table
  let html = '';
  results.sort((a,b) => b.totalReturn - a.totalReturn); // Sort by best performance
  
  for(const r of results) {
    const isBaseline = r.label.includes('QQQ');
    const rowStyle = isBaseline ? 'background:rgba(255,255,255,0.05); font-weight:bold;' : '';
    html += `<tr style="${rowStyle}">
      <td><span style="display:inline-block;width:10px;height:10px;background:${r.color};margin-right:8px;border-radius:2px;"></span>${r.label}</td>
      <td class="num">$${r.finalUSD.toLocaleString('en',{maximumFractionDigits:0})}</td>
      <td class="num" style="color:${r.totalReturn>=0?'var(--green)':'var(--red)'}">${r.totalReturn.toFixed(1)}%</td>
      <td class="num">${r.annReturn.toFixed(1)}%</td>
      <td class="num" style="color:var(--red)">${r.maxDD.toFixed(1)}%</td>
      <td class="num">$${r.totalComm.toFixed(0)}</td>
    </tr>`;
  }
  document.getElementById('summaryBody').innerHTML = html;

  // 2. Render Chart
  const datasets = results.map(r => ({
    label: r.label,
    data: r.monthlyData.map(v => +v.toFixed(0)),
    borderColor: r.color,
    borderWidth: r.label.includes('QQQ') ? 1.5 : 2,
    borderDash: r.label.includes('QQQ') ? [4,4] : [],
    pointRadius: 0,
    tension: 0.2
  }));

  if (growthChart) growthChart.destroy();
  growthChart = new Chart(document.getElementById('growthChart'), {
    type: 'line',
    data: { labels: HIST.dates, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b96a8', font:{family:"'Space Mono'"} } },
        tooltip: {
          backgroundColor: 'rgba(15,18,23,0.95)', borderColor: 'rgba(30,37,48,1)', borderWidth: 1,
          titleFont: { family: "'Space Mono'" }, bodyFont: { family: "'Space Mono'" },
          callbacks: { label: (ctx) => ` ${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(30,37,48,0.6)' }, ticks: { color: '#4a5568', font:{family:"'Space Mono'"} } },
        y: { type:'logarithmic', grid: { color: 'rgba(30,37,48,0.6)' }, ticks: { color: '#4a5568', font:{family:"'Space Mono'"} } }
      }
    }
  });
}

// ==========================================
// GIANT MATRIX RENDERER (PERFORMANCE OPTIMIZED)
// ==========================================
function renderGiantMatrix() {
  // To avoid UI freeze, we construct a giant HTML string and inject it.
  const dates = HIST.dates;
  const tickers = HIST.tickers;
  const n = dates.length;
  
  // Pre-calculate the entire matrix string
  let html = '<table class="matrix-table"><thead><tr><th>Date</th>';
  for(const t of tickers) html += `<th>${t}</th>`;
  html += '</tr></thead><tbody>';

  // We loop dates backward (newest first)
  for(let i = n - 1; i >= 60; i--) { // need at least 60 days back (approx 2 idx)
    html += `<tr><td>${dates[i].substring(0,7)}</td>`;
    
    const pastIdx = getPastIdx(i, 60);
    
    // Find top 5 for this row to highlight
    let rowScores = [];
    for(let j=0; j<tickers.length; j++) {
      const t = tickers[j];
      if(isInIdx(t, i)) {
        const cp = HIST.prices[t][i];
        const pp = HIST.prices[t][pastIdx];
        if(cp != null && pp != null && pp > 0) {
          rowScores.push({ idx: j, mom: cp/pp - 1 });
        }
      }
    }
    rowScores.sort((a,b) => b.mom - a.mom);
    const top5Set = new Set(rowScores.slice(0,5).map(x => x.idx));

    // Build row cells
    for(let j=0; j<tickers.length; j++) {
      const t = tickers[j];
      if(!isInIdx(t, i)) {
        html += `<td class="cell-out">-</td>`;
      } else {
        const cp = HIST.prices[t][i];
        const pp = HIST.prices[t][pastIdx];
        if(cp == null || pp == null || pp === 0) {
           html += `<td>-</td>`;
        } else {
           const mom = (cp/pp - 1) * 100;
           const isTop5 = top5Set.has(j);
           const cls = isTop5 ? 'cell-top5' : (mom >= 0 ? 'cell-pos' : 'cell-neg');
           html += `<td class="${cls}">${mom.toFixed(1)}%</td>`;
        }
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  document.getElementById('matrixContainer').innerHTML = html;
}
